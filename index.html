<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tree View</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
      <header class="w-full py-6 bg-white shadow-md mb-6">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between px-4">
          <h1 class="text-3xl font-bold text-indigo-700 tracking-tight">JSON Component Viewer</h1>
          <div class="mt-4 md:mt-0 flex flex-col md:flex-row items-center gap-2">
            <label for="json-upload" class="block text-sm font-medium text-gray-700">Upload JSON</label>
            <input id="json-upload" type="file" accept="application/json" class="ml-2 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
            <button id="load-sample" class="ml-2 px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">Load Sample</button>
          </div>
        </div>
      </header>
      <main class="container mx-auto flex flex-col md:flex-row gap-8 px-4">
        <section class="flex-1 bg-white rounded-lg shadow-lg p-6 mb-8 md:mb-0 overflow-auto">
          <h2 class="text-xl font-semibold mb-4 text-indigo-700">Tree View</h2>
          <div id="tree-container" class="w-full h-[600px] md:h-[700px] bg-indigo-50 rounded-lg border border-indigo-100"></div>
        </section>
        <aside class="w-full md:w-96 bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-semibold mb-4 text-indigo-700">Node Details</h2>
          <div id="node-details" class="text-gray-700 text-sm">Hover over a node to see details here.</div>
        </aside>
      </main>
      <footer class="w-full py-4 mt-8 bg-white text-center text-gray-400 text-xs border-t">&copy; 2026 JSON Component Viewer. Built with D3.js & Tailwind CSS.</footer>
    </div>
    <div id="breadcrumb" class="flex items-center gap-2 text-blue-600 font-medium max-w-5xl mx-auto mb-4 flex-wrap"></div>
    <div id="treeContainer" class="flex justify-center items-start min-h-[600px] max-w-full overflow-x-auto"></div>
    <!-- Progress Modal -->
    <div id="progress-modal" class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-lg shadow-lg p-8 flex flex-col items-center">
        <div class="mb-4 flex items-center gap-2">
          <svg class="animate-spin h-6 w-6 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
          <span id="progress-message" class="text-indigo-700 font-semibold">Parsing JSON...</span>
        </div>
        <div id="progress-steps" class="text-gray-700 text-sm w-72 max-h-40 overflow-y-auto bg-indigo-50 rounded p-2"></div>
      </div>
    </div>
</body>
</html>
