<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Tree View</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="mx-auto mt-10 mb-6 max-w-2xl p-6 bg-white rounded-xl border-2 border-dashed border-blue-200 shadow-sm flex flex-col gap-4">
        <textarea id="jsonInput" placeholder="Paste your JSON here..." class="w-full h-28 p-3 rounded-md border border-blue-200 bg-blue-50 text-base focus:outline-none focus:ring-2 focus:ring-blue-400 resize-vertical"></textarea>
        <button onclick="processJSON()" class="self-end px-6 py-2 rounded-md bg-gradient-to-r from-blue-500 to-green-400 text-white font-semibold shadow hover:from-blue-600 hover:to-green-500 transition">Process JSON</button>
    </div>
    <div id="breadcrumb" class="flex items-center gap-2 text-blue-600 font-medium max-w-5xl mx-auto mb-4 flex-wrap"></div>
    <div id="treeContainer" class="flex justify-center items-start min-h-[600px] max-w-full overflow-x-auto"></div>
</body>
</html>
